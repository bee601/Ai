<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: rgba(255,255,255,0.08);
      --accent: #7c6af7;
      --accent2: #f76ab4;
      --text: #e8e8f0;
      --muted: #8b8b9e;
      --user-bg: #1e1b3a;
      --ai-bg: #13131a;
      --green: #52e3a1;
      --red: #ff4d4d;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Inter', sans-serif;
    }
    body.light-theme {
      --bg: #f4f4f9;
      --surface: #ffffff;
      --surface2: #eaeaf2;
      --border: rgba(0,0,0,0.1);
      --accent: #5b45f4;
      --accent2: #d64596;
      --text: #111118;
      --muted: #666677;
      --user-bg: #e0dcfc;
      --ai-bg: #ffffff;
    }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; line-height: 1.6; transition: background 0.3s, color 0.3s; }
    #sidebar { width: 260px; background: var(--surface2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease, background 0.3s; }
    .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
    .new-chat-btn { flex: 1; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
    .new-chat-btn:hover { background: #9385f9; }
    .theme-btn { padding: 10px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
    .chat-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 6px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .chat-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text); background: transparent; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .chat-item:hover { background: rgba(124,106,247,0.1); }
    .chat-item.active { background: var(--surface); border-color: var(--border); color: var(--accent); font-weight: 500; }
    .chat-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .chat-actions { display: none; gap: 4px; }
    .chat-item:hover .chat-actions { display: flex; }
    .icon-btn-small { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 4px; }
    .icon-btn-small:hover { color: var(--accent); }
    .icon-btn-small.del:hover { color: var(--red); }
    #main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 60px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .logo { font-family: var(--font-display); font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .header-controls select, .header-controls button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; outline: none; }
    #settings-banner { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; flex-wrap: wrap; }
    select, button.btn-secondary, input.api-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.8rem; outline: none; cursor: pointer; transition: border-color 0.2s; }
    input.api-input { cursor: text; flex: 1; min-width: 150px; }
    .flex-1 { flex: 1; }
    #chat { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .message { display: flex; gap: 16px; max-width: 850px; width: 100%; margin: 0 auto; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; font-family: var(--font-display); }
    .message.user .avatar { background: var(--user-bg); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
    .message.ai .avatar { background: var(--surface2); color: var(--accent2); border: 1px solid rgba(247,106,180,0.3); }
    .bubble { padding: 1rem 1.25rem; border-radius: 12px; font-size: 0.95rem; max-width: 100%; overflow-x: auto; position: relative; }
    .message.user .bubble { background: var(--user-bg); border: 1px solid rgba(124,106,247,0.2); border-top-right-radius: 4px; }
    .message.ai .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .bubble p { margin-bottom: 0.75rem; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble pre { background: #0d0d12; padding: 2.5rem 1rem 1rem 1rem; border-radius: 8px; border: 1px solid var(--border); margin: 1rem 0; overflow-x: auto; position: relative; }
    body.light-theme .bubble pre { background: #f0f0f5; }
    .bubble code { font-family: var(--font-mono); font-size: 0.85rem; }
    .bubble p code { background: rgba(124,106,247,0.1); padding: 0.2rem 0.4rem; border-radius: 4px; color: var(--accent); }
    .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
    .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: dotBounce 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }
    #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; text-align: center; padding: 2rem; }
    .empty-icon { font-size: 3rem; opacity: 0.2; }
    .empty-title { font-family: var(--font-display); font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .empty-sub { font-size: 0.9rem; color: var(--muted); max-width: 380px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 600px; }
    .suggestion-chip { padding: 10px 16px; border: 1px solid var(--border); border-radius: 24px; font-size: 0.85rem; color: var(--text); cursor: pointer; transition: all 0.2s; background: var(--surface); }
    .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.1); transform: translateY(-2px); }
    #input-area { border-top: 1px solid var(--border); padding: 1.5rem; background: var(--surface); flex-shrink: 0; }
    .input-row { display: flex; gap: 12px; align-items: flex-end; max-width: 850px; margin: 0 auto; }
    .icon-btn { width: 52px; height: 52px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; font-size: 1.2rem; }
    .icon-btn:hover { background: var(--border); }
    #userInput { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-family: var(--font-sans); font-size: 0.95rem; resize: none; outline: none; min-height: 52px; max-height: 200px; transition: border-color 0.2s; overflow-y: auto; }
    #userInput:focus { border-color: var(--accent); }
    #sendBtn { background: var(--accent); border: none; }
    #sendBtn:hover { background: #9385f9; transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #sendBtn svg { fill: white; width: 20px; height: 20px; }
    .char-hint { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 10px; }
    .error-bubble { background: rgba(255, 60, 60, 0.1); border: 1px solid rgba(255,60,60,0.3); color: #ff8080; padding: 1rem; border-radius: 8px; font-size: 0.85rem; align-self: center; max-width: 600px; text-align: center; }
    dialog { margin: auto; padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); width: 90%; max-width: 500px; }
    dialog::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-header h2 { font-family: var(--font-display); font-size: 1.2rem; }
    .close-modal { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
    .key-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; max-height: 200px; overflow-y: auto; }
    .key-item { display: flex; gap: 10px; align-items: center; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; }
    .key-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .key-name-container { display: flex; align-items: center; gap: 8px; }
    .key-name { font-size: 0.85rem; font-weight: 600; }
    .key-val-container { display: flex; align-items: center; gap: 8px; }
    .key-val-input { background: transparent; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; outline: none; flex: 1; text-overflow: ellipsis; }
    .key-action-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 4px; }
    .key-action-btn:hover { color: var(--text); }
    .key-action-btn.del:hover { color: var(--red); }
    .add-key-form { display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    .add-key-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-size: 0.85rem; }
    .add-key-form button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .add-key-form button:hover { background: #9385f9; }
    @media (max-width: 768px) { #sidebar { position: absolute; height: 100%; z-index: 10; transform: translateX(-100%); } #sidebar.open { transform: translateX(0); } #menu-toggle { display: block !important; } }
    #menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
  </style>
</head>
<body>
<aside id="sidebar">
  <div class="sidebar-header">
    <button class="new-chat-btn" onclick="createNewChat()"><span id="ui-newchat">+ New Chat</span></button>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle Light/Dark Theme">🌓</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</aside>
<main id="main-content">
  <header>
    <div class="logo">
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="logo-dot"></div>
      <span id="ui-title">UniversalChat</span>
    </div>
    <div class="header-right">
      <div class="header-controls">
        <select id="langSelect" onchange="switchLanguage()">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
      </div>
    </div>
  </header>
  <div id="settings-banner">
    <select id="activeKeySelect" onchange="changeActiveKey()" style="max-width: 200px;">
      <option value="">No API Key selected</option>
    </select>
    <button class="btn-secondary" onclick="document.getElementById('keyModal').showModal()" id="ui-managekeys">⚙ Manage Keys</button>
    <div class="flex-1"></div>
    <input type="text" id="customBaseUrl" class="api-input" placeholder="API Base URL (e.g. https://api.openai.com/v1)" value="https://api.groq.com/openai/v1" onchange="saveApiSettings()">
    <input type="text" id="customModel" class="api-input" placeholder="Model ID" value="llama-3.3-70b-versatile" onchange="saveApiSettings()">
  </div>
  <div id="chat">
    <div id="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">UniversalChat</div>
      <p class="empty-sub" id="ui-emptysub">Select an API Key and start.</p>
      <div class="suggestions" id="ui-suggestions"></div>
    </div>
  </div>
  <div id="input-area">
    <div class="input-row">
      <input type="file" id="fileInput" hidden onchange="handleFileUpload(event)" accept=".txt,.js,.py,.html,.css,.json,.md,.csv">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload Text/Code File">📁</button>
      <textarea id="userInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" class="icon-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="char-hint" id="ui-hint">Enter to send · Shift+Enter for new line</p>
  </div>
</main>
<dialog id="keyModal">
  <div class="modal-header">
    <h2 id="modal-title">API Keys</h2>
    <button class="close-modal" onclick="document.getElementById('keyModal').close()">✖</button>
  </div>
  <div class="key-list" id="modalKeyList"></div>
  <div class="add-key-form">
    <input type="text" id="newKeyName" placeholder="Key Name (e.g., Main Key)" />
    <input type="password" id="newKeyValue" placeholder="sk-... or gsk_..." />
    <button onclick="addApiKey()" id="ui-addkeybtn">Add Key</button>
  </div>
</dialog>
<script>
  const translations = {
    en: { newChat: "+ New Chat", placeholder: "Type a message...", emptySub: "Select an API key and start talking.", hint: "Enter to send · Shift+Enter for new line", manageKeys: "⚙ Manage Keys", modalTitle: "API Keys", addKeyBtn: "Add Key", namePlaceholder: "Key Name (e.g. My Key)", sysPrompt: "You are a helpful AI assistant.", suggestions: [{ label: "Explain Quantum Computing", prompt: "Explain quantum computers in simple terms" }, { label: "Python To-Do App", prompt: "Write a Python script for a simple to-do app" }, { label: "Top AI Trends", prompt: "What are the top 5 AI trends for 2025?" }] },
    de: { newChat: "+ Neuer Chat", placeholder: "Nachricht eingeben...", emptySub: "Wähle einen API-Key und starte.", hint: "Enter senden · Shift+Enter neue Zeile", manageKeys: "⚙ Keys verwalten", modalTitle: "API Keys", addKeyBtn: "Key hinzufügen", namePlaceholder: "Key Name (z.B. Mein Key)", sysPrompt: "Du bist ein hilfreicher KI-Assistent.", suggestions: [{ label: "Quantencomputer erklären", prompt: "Erkläre Quantencomputer in einfachen Worten" }, { label: "Python To-Do App", prompt: "Schreib ein Python-Script für eine To-Do-App" }, { label: "KI-Trends 2025", prompt: "Was sind die Top 5 KI-Trends 2025?" }] }
  };
  let currentLang = 'en';
  let apiKeys = []; let activeKeyId = null; let chats = []; let activeChatId = null; let isLoading = false;
  marked.setOptions({ highlight: function(code, lang) { const language = hljs.getLanguage(lang) ? lang : 'plaintext'; return hljs.highlight(code, { language }).value; }, breaks: true });
  window.onload = () => {
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
    const savedBaseUrl = localStorage.getItem('customBaseUrl');
    const savedModel = localStorage.getItem('customModel');
    if(savedBaseUrl) document.getElementById('customBaseUrl').value = savedBaseUrl;
    if(savedModel) document.getElementById('customModel').value = savedModel;
    const savedKeys = localStorage.getItem('groq_api_keys');
    if (savedKeys) apiKeys = JSON.parse(savedKeys);
    const savedActiveKey = localStorage.getItem('groq_active_key_id');
    if (savedActiveKey && apiKeys.some(k => k.id === savedActiveKey)) activeKeyId = savedActiveKey;
    else if (apiKeys.length > 0) activeKeyId = apiKeys[0].id;
    const savedChats = localStorage.getItem('groq_chats');
    if (savedChats) chats = JSON.parse(savedChats);
    const savedLang = localStorage.getItem('groq_chat_lang');
    if (savedLang) { document.getElementById('langSelect').value = savedLang; currentLang = savedLang; }
    applyLanguage(); renderKeyDropdown(); renderKeyModalList(); renderChatList();
    if (chats.length > 0) selectChat(chats[0].id);
    else createNewChat();
  };
  function toggleTheme() {
    document.body.classList.toggle('light-theme');
    localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
  }
  function saveApiSettings() {
    localStorage.setItem('customBaseUrl', document.getElementById('customBaseUrl').value);
    localStorage.setItem('customModel', document.getElementById('customModel').value);
  }
  function switchLanguage() { currentLang = document.getElementById('langSelect').value; localStorage.setItem('groq_chat_lang', currentLang); applyLanguage(); }
  function applyLanguage() {
    const t = translations[currentLang];
    document.getElementById('ui-newchat').textContent = t.newChat;
    document.getElementById('userInput').placeholder = t.placeholder;
    document.getElementById('ui-emptysub').textContent = t.emptySub;
    document.getElementById('ui-hint').textContent = t.hint;
    document.getElementById('ui-managekeys').textContent = t.manageKeys;
    document.getElementById('modal-title').textContent = t.modalTitle;
    document.getElementById('ui-addkeybtn').textContent = t.addKeyBtn;
    document.getElementById('newKeyName').placeholder = t.namePlaceholder;
    const suggContainer = document.getElementById('ui-suggestions');
    if(suggContainer) {
      suggContainer.innerHTML = '';
      t.suggestions.forEach(s => {
        const chip = document.createElement('div'); chip.className = 'suggestion-chip'; chip.textContent = s.label; chip.onclick = () => usePrompt(s.prompt);
        suggContainer.appendChild(chip);
      });
    }
  }
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
  function saveKeys() { localStorage.setItem('groq_api_keys', JSON.stringify(apiKeys)); if (activeKeyId) localStorage.setItem('groq_active_key_id', activeKeyId); renderKeyDropdown(); renderKeyModalList(); }
  function renderKeyDropdown() {
    const select = document.getElementById('activeKeySelect'); select.innerHTML = '<option value="">No API Key selected</option>';
    apiKeys.forEach(k => { const opt = document.createElement('option'); opt.value = k.id; opt.textContent = k.name; if (k.id === activeKeyId) opt.selected = true; select.appendChild(opt); });
  }
  function changeActiveKey() { activeKeyId = document.getElementById('activeKeySelect').value; if(activeKeyId) localStorage.setItem('groq_active_key_id', activeKeyId); else localStorage.removeItem('groq_active_key_id'); }
  function addApiKey() {
    const nameInput = document.getElementById('newKeyName'); const valInput = document.getElementById('newKeyValue');
    const name = nameInput.value.trim() || 'My Key'; const val = valInput.value.trim(); if (!val) return;
    const newKey = { id: Date.now().toString(), name, value: val }; apiKeys.push(newKey); if (!activeKeyId) activeKeyId = newKey.id;
    nameInput.value = ''; valInput.value = ''; saveKeys();
  }
  function deleteKey(id) { if(!confirm('Delete this key?')) return; apiKeys = apiKeys.filter(k => k.id !== id); if (activeKeyId === id) activeKeyId = apiKeys.length > 0 ? apiKeys[0].id : null; saveKeys(); }
  function editKeyName(id) {
    const newName = prompt('Enter new key name:');
    if(newName) { const key = apiKeys.find(k => k.id === id); if(key) { key.name = newName; saveKeys(); } }
  }
  function toggleKeyVisibility(btn, inputId) { const input = document.getElementById(inputId); if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; } else { input.type = 'password'; btn.textContent = '👁'; } }
  function renderKeyModalList() {
    const list = document.getElementById('modalKeyList'); list.innerHTML = '';
    apiKeys.forEach(k => {
      const item = document.createElement('div'); item.className = 'key-item';
      item.innerHTML = `
        <div class="key-info">
          <div class="key-name-container">
            <span class="key-name">${k.name}</span>
            <button class="icon-btn-small" onclick="editKeyName('${k.id}')" title="Edit Name">✏️</button>
          </div>
          <div class="key-val-container">
            <input type="password" class="key-val-input" id="key-val-${k.id}" value="${k.value}" readonly />
            <button class="key-action-btn" onclick="toggleKeyVisibility(this, 'key-val-${k.id}')" title="Show/Hide">👁</button>
          </div>
        </div>
        <button class="key-action-btn del" onclick="deleteKey('${k.id}')" title="Delete">🗑</button>
      `;
      list.appendChild(item);
    });
  }
  function getActiveApiKey() { const keyObj = apiKeys.find(k => k.id === activeKeyId); return keyObj ? keyObj.value : null; }
  function saveChats() { localStorage.setItem('groq_chats', JSON.stringify(chats)); renderChatList(); }
  function createNewChat() { const newChat = { id: 'chat_' + Date.now(), title: translations[currentLang].newChat, history: [] }; chats.unshift(newChat); saveChats(); selectChat(newChat.id); if(window.innerWidth <= 768) toggleSidebar(); }
  function selectChat(id) { activeChatId = id; renderChatList(); renderActiveChat(); }
  function deleteChat(e, id) { e.stopPropagation(); if(!confirm('Delete chat?')) return; chats = chats.filter(c => c.id !== id); if(chats.length === 0) createNewChat(); else if(activeChatId === id) selectChat(chats[0].id); else saveChats(); }
  function editChatName(e, id) {
    e.stopPropagation();
    const newName = prompt('Enter new chat name:');
    if(newName) { const chat = chats.find(c => c.id === id); if(chat) { chat.title = newName; saveChats(); } }
  }
  function renderChatList() {
    const list = document.getElementById('chatList'); list.innerHTML = '';
    chats.forEach(c => {
      const div = document.createElement('div'); div.className = `chat-item ${c.id === activeChatId ? 'active' : ''}`; div.onclick = () => selectChat(c.id);
      div.innerHTML = `
        <span class="chat-title">${c.title}</span>
        <div class="chat-actions">
          <button class="icon-btn-small" onclick="editChatName(event, '${c.id}')" title="Edit">✏️</button>
          <button class="icon-btn-small del" onclick="deleteChat(event, '${c.id}')" title="Delete">✖</button>
        </div>
      `;
      list.appendChild(div);
    });
  }
  function renderActiveChat() {
    const chatContainer = document.getElementById('chat'); chatContainer.innerHTML = '';
    const activeChat = chats.find(c => c.id === activeChatId);
    if (!activeChat || activeChat.history.length === 0) {
      chatContainer.innerHTML = `
        <div id="empty-state">
          <div class="empty-icon">◈</div>
          <div class="empty-title">UniversalChat</div>
          <p class="empty-sub" id="ui-emptysub">${translations[currentLang].emptySub}</p>
          <div class="suggestions" id="ui-suggestions"></div>
        </div>
      `; applyLanguage(); return;
    }
    activeChat.history.forEach(msg => { if (msg.role !== 'system') appendMessage(msg.role === 'assistant' ? 'ai' : 'user', msg.content); });
  }
  function updateActiveChatHistory(historyArr, newTitle) {
    const activeChat = chats.find(c => c.id === activeChatId);
    if(activeChat) { activeChat.history = historyArr; if(newTitle && (activeChat.title.includes('New Chat') || activeChat.title.includes('Neuer Chat'))) { activeChat.title = newTitle.substring(0, 30) + '...'; } saveChats(); }
  }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function usePrompt(text) { const input = document.getElementById('userInput'); input.value = text; autoResize(input); input.focus(); }
  function handleFileUpload(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => { const text = event.target.result; const input = document.getElementById('userInput'); input.value += `\n\n[File: ${file.name}]\n\`\`\`\n${text}\n\`\`\`\n`; autoResize(input); input.focus(); };
    reader.readAsText(file); e.target.value = '';
  }
  function addCopyButtons(containerElement) {
    containerElement.querySelectorAll('pre').forEach(pre => {
      if(pre.querySelector('.copy-btn')) return;
      const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.textContent = currentLang === 'en' ? 'Copy' : 'Kopieren';
      btn.onclick = () => { const codeElement = pre.querySelector('code'); if(codeElement) { navigator.clipboard.writeText(codeElement.innerText).then(() => { btn.textContent = currentLang === 'en' ? 'Copied!' : 'Kopiert!'; setTimeout(() => { btn.textContent = currentLang === 'en' ? 'Copy' : 'Kopieren'; }, 2000); }); } };
      pre.appendChild(btn);
    });
  }
  function appendMessage(role, content) {
    const empty = document.getElementById('empty-state'); if (empty) empty.remove();
    const chat = document.getElementById('chat'); const div = document.createElement('div'); div.className = `message ${role}`;
    const avatar = document.createElement('div'); avatar.className = 'avatar'; avatar.textContent = role === 'user' ? 'DU' : 'AI';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    if (role === 'ai') { bubble.innerHTML = marked.parse(content); addCopyButtons(bubble); } else { bubble.textContent = content; }
    div.appendChild(avatar); div.appendChild(bubble); chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  }
  function showTyping() {
    const empty = document.getElementById('empty-state'); if (empty) empty.remove();
    const chat = document.getElementById('chat'); const div = document.createElement('div'); div.className = 'message ai'; div.id = 'typing-msg';
    div.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping() { const t = document.getElementById('typing-msg'); if (t) t.remove(); }
  function showError(msg) { const chat = document.getElementById('chat'); const el = document.createElement('div'); el.className = 'error-bubble'; el.textContent = '⚠ ' + msg; chat.appendChild(el); chat.scrollTop = chat.scrollHeight; }
  async function sendMessage() {
    const input = document.getElementById('userInput'); const text = input.value.trim(); const apiKey = getActiveApiKey();
    const baseUrl = document.getElementById('customBaseUrl').value.trim();
    const modelId = document.getElementById('customModel').value.trim();
    if (!text) return;
    if (!apiKey) { showError(currentLang === 'en' ? 'Select or add an API Key first.' : 'Bitte wähle zuerst einen API-Key aus.'); return; }
    if (!baseUrl || !modelId) { showError('Please specify a Base URL and Model ID in the header.'); return; }
    if (isLoading) return;
    input.value = ''; input.style.height = 'auto'; isLoading = true; document.getElementById('sendBtn').disabled = true;
    appendMessage('user', text);
    const activeChat = chats.find(c => c.id === activeChatId);
    let hist = [...activeChat.history];
    if(hist.length === 0) hist.push({ role: 'system', content: translations[currentLang].sysPrompt });
    hist.push({ role: 'user', content: text });
    updateActiveChatHistory(hist, text); showTyping();
    try {
      const res = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model: modelId, messages: hist, max_tokens: 2048, temperature: 0.7 })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `API Error ${res.status}`);
      const reply = data.choices[0].message.content;
      removeTyping(); appendMessage('ai', reply);
      hist.push({ role: 'assistant', content: reply }); updateActiveChatHistory(hist);
    } catch (err) {
      removeTyping(); showError(err.message); hist.pop(); updateActiveChatHistory(hist);
    }
    isLoading = false; document.getElementById('sendBtn').disabled = false; input.focus();
  }
</script>
</body>
