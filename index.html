<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groq AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: rgba(255,255,255,0.08);
      --accent: #7c6af7;
      --accent2: #f76ab4;
      --text: #e8e8f0;
      --muted: #8b8b9e;
      --user-bg: #1e1b3a;
      --ai-bg: #13131a;
      --green: #52e3a1;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      line-height: 1.6;
    }

    /* --- HEADER --- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-controls select, .header-controls button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      outline: none;
    }

    .model-badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--green);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    /* --- KEY INPUT BANNER --- */
    #key-banner {
      background: linear-gradient(135deg, #1a1030 0%, #13131a 100%);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    #key-banner label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    #apiKey, #modelSelect {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #apiKey { flex: 1; }
    #apiKey:focus, #modelSelect:focus { border-color: var(--accent); }
    #apiKey::placeholder { color: var(--muted); }

    /* --- CHAT AREA --- */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .message {
      display: flex;
      gap: 16px;
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      font-family: var(--font-display);
    }

    .message.user .avatar { background: var(--user-bg); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
    .message.ai  .avatar  { background: var(--surface2); color: var(--accent2); border: 1px solid rgba(247,106,180,0.3); }

    .bubble {
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-size: 0.95rem;
      max-width: 100%;
      overflow-x: auto;
      position: relative;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(124,106,247,0.2);
      border-top-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* Markdown & Code Styles inside Bubble */
    .bubble p { margin-bottom: 0.75rem; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble pre {
      background: #0d0d12;
      padding: 2.5rem 1rem 1rem 1rem; /* Extra top padding for the copy button */
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 1rem 0;
      overflow-x: auto;
      position: relative;
    }
    .bubble code {
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
    .bubble p code {
      background: rgba(255,255,255,0.1);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
    }
    .bubble ul, .bubble ol {
      margin-left: 1.5rem;
      margin-bottom: 0.75rem;
    }

    /* Copy Button for code blocks */
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* --- EMPTY STATE --- */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    .empty-icon {
      font-size: 3rem;
      opacity: 0.2;
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .empty-sub {
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 380px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 600px;
    }

    .suggestion-chip {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
    }
    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124,106,247,0.1);
      transform: translateY(-2px);
    }

    /* --- INPUT BAR --- */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      max-width: 850px;
      margin: 0 auto;
    }

    .icon-btn {
      width: 52px; height: 52px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 1.2rem;
    }
    .icon-btn:hover { background: var(--border); }

    #userInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      resize: none;
      outline: none;
      min-height: 52px;
      max-height: 200px;
      transition: border-color 0.2s;
      overflow-y: auto;
    }
    #userInput:focus { border-color: var(--accent); }
    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      background: var(--accent);
      border: none;
    }
    #sendBtn:hover { background: #9385f9; transform: scale(1.05); border-color: transparent;}
    #sendBtn:active { transform: scale(0.96); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #sendBtn svg { fill: white; width: 20px; height: 20px; }

    .char-hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 10px;
    }

    /* scrollbar */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

    /* error */
    .error-bubble {
      background: rgba(255, 60, 60, 0.1);
      border: 1px solid rgba(255,60,60,0.3);
      color: #ff8080;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      align-self: center;
      max-width: 600px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span id="ui-title">GroqChat</span>
  </div>
  <div class="header-right">
    <div class="header-controls">
      <select id="langSelect" onchange="switchLanguage()">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
      </select>
      <button onclick="clearChat()" id="ui-clear">Clear Chat</button>
    </div>
    <div class="model-badge" id="modelLabel">llama-3.3-70b-versatile</div>
    <div class="status"><div class="status-dot"></div>online</div>
  </div>
</header>

<div id="key-banner">
  <label id="ui-apikey">API KEY</label>
  <input type="password" id="apiKey" placeholder="gsk_..." oninput="saveApiKey()" />
  <select id="modelSelect" onchange="updateModel()">
    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
    <option value="llama-3.1-8b-instant">Llama 3.1 8B (fast)</option>
    <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
    <option value="gemma2-9b-it">Gemma 2 9B</option>
  </select>
</div>

<div id="chat">
  <div id="empty-state">
    <div class="empty-icon">◈</div>
    <div class="empty-title">GroqChat</div>
    <p class="empty-sub" id="ui-emptysub">Enter your API key and start.</p>
    <div class="suggestions" id="ui-suggestions">
      </div>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <input type="file" id="fileInput" hidden onchange="handleFileUpload(event)" accept=".txt,.js,.py,.html,.css,.json,.md,.csv">
    <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload Text/Code File">
      📁
    </button>
    <textarea id="userInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" class="icon-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="char-hint" id="ui-hint">Enter to send · Shift+Enter for new line</p>
</div>

<script>
  // Language configuration
  const translations = {
    en: {
      placeholder: "Type a message...",
      emptySub: "Ultra-fast AI answers, powered by Groq. Enter your API key and start.",
      hint: "Enter to send · Shift+Enter for new line",
      clearBtn: "Clear Chat",
      sysPrompt: "You are a helpful, highly capable AI assistant. Please respond primarily in English. Ensure your answers are concise and formatting is clean.",
      suggestions: [
        { label: "Explain Quantum Computing", prompt: "Explain quantum computers in simple terms" },
        { label: "Python To-Do App", prompt: "Write a Python script for a simple to-do app" },
        { label: "Top AI Trends", prompt: "What are the top 5 AI trends for 2025?" },
        { label: "Write a Tweet", prompt: "Create a creative tweet about technology" }
      ]
    },
    de: {
      placeholder: "Nachricht eingeben...",
      emptySub: "Ultraschnelle KI-Antworten, powered by Groq. Gib deinen API-Key ein und starte.",
      hint: "Enter senden · Shift+Enter neue Zeile",
      clearBtn: "Chat löschen",
      sysPrompt: "Du bist ein hilfreicher, hochleistungsfähiger KI-Assistent. Bitte antworte hauptsächlich auf Deutsch. Halte deine Antworten präzise und übersichtlich formatiert.",
      suggestions: [
        { label: "Quantencomputer erklären", prompt: "Erkläre Quantencomputer in einfachen Worten" },
        { label: "Python To-Do App", prompt: "Schreib ein Python-Script für eine To-Do-App" },
        { label: "KI-Trends 2025", prompt: "Was sind die Top 5 KI-Trends 2025?" },
        { label: "Tweet schreiben", prompt: "Erstelle einen kreativen Tweet über Technologie" }
      ]
    }
  };

  let currentLang = 'en';
  let history = [];
  let isLoading = false;
  let currentModel = 'llama-3.3-70b-versatile';

  // Configure Marked.js to use Highlight.js
  marked.setOptions({
    highlight: function(code, lang) {
      const language = hljs.getLanguage(lang) ? lang : 'plaintext';
      return hljs.highlight(code, { language }).value;
    },
    breaks: true
  });

  // Load Data on Start
  window.onload = () => {
    // Load API Key
    const savedKey = localStorage.getItem('groq_api_key');
    if (savedKey) document.getElementById('apiKey').value = savedKey;

    // Load Language preference
    const savedLang = localStorage.getItem('groq_chat_lang');
    if (savedLang && (savedLang === 'en' || savedLang === 'de')) {
      document.getElementById('langSelect').value = savedLang;
      currentLang = savedLang;
    }
    applyLanguage();

    // Load Chat History
    const savedHistory = localStorage.getItem('groq_chat_history');
    if (savedHistory) {
      const parsed = JSON.parse(savedHistory);
      if (parsed.length > 0) {
        history = parsed;
        const empty = document.getElementById('empty-state');
        if (empty) empty.style.display = 'none';

        // Render existing history (skipping system prompts)
        history.forEach(msg => {
          if (msg.role !== 'system') {
            appendMessage(msg.role === 'assistant' ? 'ai' : 'user', msg.content, true);
          }
        });
      }
    }
  };

  function saveApiKey() {
    const key = document.getElementById('apiKey').value.trim();
    localStorage.setItem('groq_api_key', key);
  }

  function saveChatHistory() {
    localStorage.setItem('groq_chat_history', JSON.stringify(history));
  }

  function clearChat() {
    if(confirm(currentLang === 'en' ? "Are you sure you want to clear the chat?" : "Möchten Sie den Chat wirklich löschen?")) {
      history = [];
      saveChatHistory();
      document.getElementById('chat').innerHTML = '';
      location.reload(); // Quick way to reset UI
    }
  }

  function switchLanguage() {
    currentLang = document.getElementById('langSelect').value;
    localStorage.setItem('groq_chat_lang', currentLang);
    applyLanguage();
  }

  function applyLanguage() {
    const t = translations[currentLang];
    document.getElementById('userInput').placeholder = t.placeholder;
    document.getElementById('ui-emptysub').textContent = t.emptySub;
    document.getElementById('ui-hint').textContent = t.hint;
    document.getElementById('ui-clear').textContent = t.clearBtn;
    
    const suggContainer = document.getElementById('ui-suggestions');
    if(suggContainer) {
      suggContainer.innerHTML = '';
      t.suggestions.forEach(s => {
        const chip = document.createElement('div');
        chip.className = 'suggestion-chip';
        chip.textContent = s.label;
        chip.onclick = () => usePrompt(s.prompt);
        suggContainer.appendChild(chip);
      });
    }
  }

  function updateModel() {
    currentModel = document.getElementById('modelSelect').value;
    document.getElementById('modelLabel').textContent = currentModel;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function usePrompt(text) {
    const input = document.getElementById('userInput');
    input.value = text;
    autoResize(input);
    input.focus();
  }

  // Handle File Upload and read text
  function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const text = event.target.result;
      const input = document.getElementById('userInput');
      
      const fileLabel = currentLang === 'en' ? 'File Content' : 'Dateiinhalt';
      const fileString = `\n\n[${fileLabel}: ${file.name}]\n\`\`\`\n${text}\n\`\`\`\n`;
      
      input.value += fileString;
      autoResize(input);
      input.focus();
    };
    reader.onerror = () => {
      showError(currentLang === 'en' ? "Error reading file." : "Fehler beim Lesen der Datei.");
    };
    reader.readAsText(file);
    e.target.value = ''; // Reset input
  }

  // Adds copy buttons to code blocks generated by marked
  function addCopyButtons(containerElement) {
    const preBlocks = containerElement.querySelectorAll('pre');
    preBlocks.forEach(pre => {
      // Prevent adding multiple buttons if function runs again
      if(pre.querySelector('.copy-btn')) return; 

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = currentLang === 'en' ? 'Copy' : 'Kopieren';
      
      btn.onclick = () => {
        const codeElement = pre.querySelector('code');
        if(codeElement) {
          navigator.clipboard.writeText(codeElement.innerText).then(() => {
            btn.textContent = currentLang === 'en' ? 'Copied!' : 'Kopiert!';
            setTimeout(() => {
              btn.textContent = currentLang === 'en' ? 'Copy' : 'Kopieren';
            }, 2000);
          });
        }
      };
      pre.appendChild(btn);
    });
  }

  function appendMessage(role, content, isRestoring = false) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.style.display = 'none';

    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'DU' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    
    // Parse Markdown for AI responses, keep text for User
    if (role === 'ai') {
      bubble.innerHTML = marked.parse(content);
      addCopyButtons(bubble); // Inject copy buttons after parsing
    } else {
      bubble.textContent = content;
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    
    return bubble;
  }

  function showTyping() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.style.display = 'none';

    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  function showError(msg) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = 'error-bubble';
    el.textContent = '⚠ ' + msg;
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const apiKey = document.getElementById('apiKey').value.trim();
    const text = input.value.trim();

    if (!text) return;
    if (!apiKey) { 
      showError(currentLang === 'en' ? 'Please enter your Groq API Key first.' : 'Bitte zuerst den Groq API-Key eingeben.'); 
      return; 
    }
    if (isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', text);
    
    // Add system prompt if history is empty
    if(history.length === 0) {
      history.push({ role: 'system', content: translations[currentLang].sysPrompt });
    }

    history.push({ role: 'user', content: text });
    saveChatHistory(); // Save immediately after user sends

    showTyping();

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: currentModel,
          messages: history,
          max_tokens: 2048,
          temperature: 0.7,
          stream: false
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error?.message || `API Error ${res.status}`);
      }

      const reply = data.choices[0].message.content;
      removeTyping();
      appendMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });
      saveChatHistory(); // Save immediately after AI replies

    } catch (err) {
      removeTyping();
      showError(err.message);
      // Remove the last user prompt from history so it doesn't break future context
      history.pop();
      saveChatHistory();
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
