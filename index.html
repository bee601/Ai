<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Modern CSS Reset & Variables */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f11;
      --surface: #18181b;
      --surface2: #27272a;
      --surface3: #3f3f46;
      --border: #27272a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --user-bg: #27272a;
      --ai-bg: transparent;
      --danger: #ef4444;
      --success: #22c55e;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    body.light-theme {
      --bg: #f9fafb;
      --surface: #ffffff;
      --surface2: #f4f4f5;
      --surface3: #e4e4e7;
      --border: #e4e4e7;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text: #09090b;
      --muted: #71717a;
      --user-bg: #f4f4f5;
      --ai-bg: transparent;
    }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; line-height: 1.6; transition: background 0.3s, color 0.3s; }
    
    /* Sidebar */
    #sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease; z-index: 20; }
    .sidebar-header { padding: 1rem; display: flex; gap: 10px; border-bottom: 1px solid var(--border); }
    .btn-primary { flex: 1; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; font-family: inherit; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-icon { padding: 10px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .btn-icon:hover { background: var(--surface3); }
    
    .chat-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 4px; }
    .chat-list::-webkit-scrollbar { width: 6px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
    .chat-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: var(--text); display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; border: 1px solid transparent; }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: var(--surface2); border-color: var(--border); font-weight: 500; }
    .chat-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .chat-actions { display: none; gap: 4px; }
    .chat-item:hover .chat-actions { display: flex; }
    .icon-btn-small { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 2px; border-radius: 4px; }
    .icon-btn-small:hover { color: var(--text); background: var(--surface3); }
    .icon-btn-small.del:hover { color: var(--danger); }

    /* Main Content */
    #main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    
    /* Header */
    header { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 60px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .logo { font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    
    /* Settings Banner */
    #settings-banner { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; font-size: 0.85rem; }
    select, input.api-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 0.85rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
    select:focus, input.api-input:focus { border-color: var(--accent); }
    .flex-1 { flex: 1; }
    
    /* Chat Area */
    #chat { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
    
    .message { display: flex; gap: 16px; max-width: 800px; width: 100%; margin: 0 auto; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    
    .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); }
    .message.user .avatar { background: var(--accent); color: white; border: none; }
    
    .bubble { padding: 0.5rem 0; font-size: 0.95rem; max-width: calc(100% - 50px); overflow-x: auto; color: var(--text); }
    .message.user .bubble { background: var(--user-bg); padding: 0.75rem 1rem; border-radius: 12px; border-top-right-radius: 4px; border: 1px solid var(--border); }
    
    .bubble p { margin-bottom: 0.75rem; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble pre { background: var(--surface2); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); margin: 1rem 0; overflow-x: auto; position: relative; }
    .bubble code { font-family: var(--font-mono); font-size: 0.85rem; }
    .bubble p code { background: var(--surface2); padding: 0.2rem 0.4rem; border-radius: 4px; border: 1px solid var(--border); }
    
    .bubble img { max-width: 100%; border-radius: 8px; margin-top: 0.5rem; border: 1px solid var(--border); }
    
    .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--surface3); border: none; color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
    .bubble pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: var(--accent); color: white; }
    
    /* Empty State */
    #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 2rem; height: 100%; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .empty-title { font-size: 1.5rem; font-weight: 600; }
    .empty-sub { font-size: 0.95rem; color: var(--muted); max-width: 400px; }
    
    /* Input Area */
    #input-area { padding: 1rem 1.5rem 1.5rem; background: var(--bg); flex-shrink: 0; }
    .input-container { max-width: 800px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; transition: border-color 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .input-container:focus-within { border-color: var(--accent); }
    
    #attachments-preview { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 0.5rem; }
    .attachment-item { position: relative; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; max-width: 150px; }
    .attachment-item img { width: 24px; height: 24px; object-fit: cover; border-radius: 4px; }
    .attachment-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attachment-remove { position: absolute; top: -6px; right: -6px; background: var(--surface3); color: var(--text); border: 1px solid var(--border); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; }
    .attachment-remove:hover { background: var(--danger); color: white; border-color: var(--danger); }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .icon-btn { width: 40px; height: 40px; border-radius: 10px; background: transparent; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; font-size: 1.2rem; }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    
    #userInput { flex: 1; background: transparent; border: none; padding: 10px 4px; color: var(--text); font-family: var(--font-sans); font-size: 0.95rem; resize: none; outline: none; min-height: 44px; max-height: 200px; overflow-y: auto; }
    
    #sendBtn { background: var(--accent); color: white; border-radius: 10px; width: 40px; height: 40px; }
    #sendBtn:hover { background: var(--accent-hover); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #sendBtn svg { fill: currentColor; width: 18px; height: 18px; }
    
    /* Modals */
    dialog { margin: auto; padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; color: var(--text); width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-header h2 { font-size: 1.2rem; font-weight: 600; }
    .close-modal { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
    .close-modal:hover { color: var(--text); }
    
    .key-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; max-height: 250px; overflow-y: auto; }
    .key-item { display: flex; gap: 10px; align-items: center; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; }
    .key-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .key-name { font-size: 0.85rem; font-weight: 600; }
    .key-val-input { background: transparent; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; outline: none; width: 100%; text-overflow: ellipsis; }
    
    .add-key-form { display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    .add-key-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--text); font-size: 0.85rem; outline: none; }
    .add-key-form input:focus { border-color: var(--accent); }
    
    /* Mobile */
    #menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
    @media (max-width: 768px) { 
      #sidebar { position: absolute; height: 100%; transform: translateX(-100%); } 
      #sidebar.open { transform: translateX(0); } 
      #menu-toggle { display: block; } 
      .message { max-width: 100%; }
    }
    
    /* Typing indicator */
    .typing-dots { display: flex; gap: 4px; padding: 8px 0; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite ease-in-out both; }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
<aside id="sidebar">
  <div class="sidebar-header">
    <button class="btn-primary" onclick="createNewChat()">+ New Chat</button>
    <button class="btn-icon" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</aside>
<main id="main-content">
  <header>
    <div class="logo">
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
      UniversalChat
    </div>
    <div class="header-right">
      <button class="btn-icon" style="font-size:0.85rem; padding: 6px 12px;" onclick="document.getElementById('keyModal').showModal()">⚙ Keys</button>
    </div>
  </header>
  <div id="settings-banner">
    <span>Provider:</span>
    <select id="providerSelect" onchange="onProviderChange()">
      <option value="groq">Groq</option>
      <option value="openai">OpenAI</option>
      <option value="gemini">Google Gemini</option>
      <option value="anthropic">Anthropic (via proxy)</option>
      <option value="custom">Custom</option>
    </select>
    
    <span>Model:</span>
    <select id="modelSelect" onchange="saveApiSettings()"></select>
    
    <input type="text" id="customBaseUrl" class="api-input" placeholder="Custom Base URL" style="display:none" onchange="saveApiSettings()">
    <input type="text" id="customModel" class="api-input" placeholder="Custom Model ID" style="display:none" onchange="saveApiSettings()">
    
    <div class="flex-1"></div>
    <select id="activeKeySelect" onchange="changeActiveKey()" style="max-width: 150px;">
      <option value="">No Key Selected</option>
    </select>
  </div>
  
  <div id="chat">
    <div id="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-title">How can I help you today?</div>
      <p class="empty-sub">Select your provider, ensure your API key is set, and start chatting. You can upload images and text files too!</p>
    </div>
  </div>
  
  <div id="input-area">
    <div class="input-container">
      <div id="attachments-preview"></div>
      <div class="input-row">
        <input type="file" id="fileInput" hidden onchange="handleFileUpload(event)" accept="image/*,.txt,.js,.py,.html,.css,.json,.md,.csv">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload File/Image">📎</button>
        <textarea id="userInput" placeholder="Message UniversalChat..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="sendBtn" class="icon-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</main>

<dialog id="keyModal">
  <div class="modal-header">
    <h2>Manage API Keys</h2>
    <button class="close-modal" onclick="document.getElementById('keyModal').close()">✖</button>
  </div>
  <div class="key-list" id="modalKeyList"></div>
  <div class="add-key-form">
    <input type="text" id="newKeyName" placeholder="Key Name (e.g., Groq Main, OpenAI Work)" />
    <input type="password" id="newKeyValue" placeholder="sk-... or gsk_..." />
    <button class="btn-primary" onclick="addApiKey()">Add Key</button>
  </div>
</dialog>

<script>
  const PROVIDERS = {
    groq: {
      url: "https://api.groq.com/openai/v1",
      models: ["llama-3.3-70b-versatile", "llama-3.2-90b-vision-preview", "llama-3.2-11b-vision-preview", "mixtral-8x7b-32768", "gemma2-9b-it", "deepseek-r1-distill-llama-70b"]
    },
    openai: {
      url: "https://api.openai.com/v1",
      models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo", "gpt-3.5-turbo"]
    },
    gemini: {
      url: "https://generativelanguage.googleapis.com/v1beta/openai",
      models: ["gemini-2.5-flash", "gemini-2.5-pro", "gemini-1.5-flash", "gemini-1.5-pro"]
    },
    anthropic: {
      url: "https://api.anthropic.com/v1", // Note: Direct Anthropic API requires different format. This assumes user has an OpenAI-compatible proxy if they select it, or they use Custom.
      models: ["claude-3-5-sonnet-latest", "claude-3-5-haiku-latest", "claude-3-opus-20240229"]
    },
    custom: { url: "", models: [] }
  };

  let apiKeys = []; let activeKeyId = null; let chats = []; let activeChatId = null; let isLoading = false;
  let attachments = []; 

  marked.setOptions({ highlight: function(code, lang) { const language = hljs.getLanguage(lang) ? lang : 'plaintext'; return hljs.highlight(code, { language }).value; }, breaks: true });

  window.onload = () => {
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
    
    // Load Keys
    const savedKeys = localStorage.getItem('groq_api_keys');
    if (savedKeys) apiKeys = JSON.parse(savedKeys);
    const savedActiveKey = localStorage.getItem('groq_active_key_id');
    if (savedActiveKey && apiKeys.some(k => k.id === savedActiveKey)) activeKeyId = savedActiveKey;
    else if (apiKeys.length > 0) activeKeyId = apiKeys[0].id;
    
    // Load Provider Settings
    const savedProvider = localStorage.getItem('chat_provider') || 'groq';
    document.getElementById('providerSelect').value = savedProvider;
    onProviderChange(false);
    const savedModel = localStorage.getItem('chat_model');
    if(savedModel) document.getElementById('modelSelect').value = savedModel;
    
    document.getElementById('customBaseUrl').value = localStorage.getItem('customBaseUrl') || '';
    document.getElementById('customModel').value = localStorage.getItem('customModel') || '';

    // Load Chats
    const savedChats = localStorage.getItem('groq_chats');
    if (savedChats) chats = JSON.parse(savedChats);
    
    renderKeyDropdown(); renderKeyModalList(); renderChatList();
    if (chats.length > 0) selectChat(chats[0].id);
    else createNewChat();
  };

  function toggleTheme() {
    document.body.classList.toggle('light-theme');
    localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
  }

  function onProviderChange(save = true) {
    const provider = document.getElementById('providerSelect').value;
    const modelSelect = document.getElementById('modelSelect');
    const customUrl = document.getElementById('customBaseUrl');
    const customModel = document.getElementById('customModel');

    modelSelect.innerHTML = '';
    if (provider === 'custom') {
      modelSelect.style.display = 'none';
      customUrl.style.display = 'block';
      customModel.style.display = 'block';
    } else {
      modelSelect.style.display = 'block';
      customUrl.style.display = 'none';
      customModel.style.display = 'none';
      PROVIDERS[provider].models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        modelSelect.appendChild(opt);
      });
    }
    if(save) saveApiSettings();
  }

  function saveApiSettings() {
    localStorage.setItem('chat_provider', document.getElementById('providerSelect').value);
    localStorage.setItem('chat_model', document.getElementById('modelSelect').value);
    localStorage.setItem('customBaseUrl', document.getElementById('customBaseUrl').value);
    localStorage.setItem('customModel', document.getElementById('customModel').value);
  }

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
  
  // Key Management
  function saveKeys() { localStorage.setItem('groq_api_keys', JSON.stringify(apiKeys)); if (activeKeyId) localStorage.setItem('groq_active_key_id', activeKeyId); renderKeyDropdown(); renderKeyModalList(); }
  function renderKeyDropdown() {
    const select = document.getElementById('activeKeySelect'); select.innerHTML = '<option value="">No API Key</option>';
    apiKeys.forEach(k => { const opt = document.createElement('option'); opt.value = k.id; opt.textContent = k.name; if (k.id === activeKeyId) opt.selected = true; select.appendChild(opt); });
  }
  function changeActiveKey() { activeKeyId = document.getElementById('activeKeySelect').value; if(activeKeyId) localStorage.setItem('groq_active_key_id', activeKeyId); else localStorage.removeItem('groq_active_key_id'); }
  function addApiKey() {
    const nameInput = document.getElementById('newKeyName'); const valInput = document.getElementById('newKeyValue');
    const name = nameInput.value.trim() || 'My Key'; const val = valInput.value.trim(); if (!val) return;
    const newKey = { id: Date.now().toString(), name, value: val }; apiKeys.push(newKey); if (!activeKeyId) activeKeyId = newKey.id;
    nameInput.value = ''; valInput.value = ''; saveKeys();
  }
  function deleteKey(id) { if(!confirm('Delete this key?')) return; apiKeys = apiKeys.filter(k => k.id !== id); if (activeKeyId === id) activeKeyId = apiKeys.length > 0 ? apiKeys[0].id : null; saveKeys(); }
  function renderKeyModalList() {
    const list = document.getElementById('modalKeyList'); list.innerHTML = '';
    apiKeys.forEach(k => {
      const item = document.createElement('div'); item.className = 'key-item';
      item.innerHTML = `
        <div class="key-info">
          <span class="key-name">${k.name}</span>
          <input type="password" class="key-val-input" value="${k.value}" readonly />
        </div>
        <button class="icon-btn-small del" onclick="deleteKey('${k.id}')" title="Delete">🗑</button>
      `;
      list.appendChild(item);
    });
  }
  function getActiveApiKey() { const keyObj = apiKeys.find(k => k.id === activeKeyId); return keyObj ? keyObj.value : null; }

  // Chat Management
  function saveChats() { localStorage.setItem('groq_chats', JSON.stringify(chats)); renderChatList(); }
  function createNewChat() { const newChat = { id: 'chat_' + Date.now(), title: "New Chat", history: [] }; chats.unshift(newChat); saveChats(); selectChat(newChat.id); if(window.innerWidth <= 768) toggleSidebar(); }
  function selectChat(id) { activeChatId = id; renderChatList(); renderActiveChat(); }
  function deleteChat(e, id) { e.stopPropagation(); if(!confirm('Delete chat?')) return; chats = chats.filter(c => c.id !== id); if(chats.length === 0) createNewChat(); else if(activeChatId === id) selectChat(chats[0].id); else saveChats(); }
  function renderChatList() {
    const list = document.getElementById('chatList'); list.innerHTML = '';
    chats.forEach(c => {
      const div = document.createElement('div'); div.className = `chat-item ${c.id === activeChatId ? 'active' : ''}`; div.onclick = () => selectChat(c.id);
      div.innerHTML = `<span class="chat-title">${c.title}</span><div class="chat-actions"><button class="icon-btn-small del" onclick="deleteChat(event, '${c.id}')">✖</button></div>`;
      list.appendChild(div);
    });
  }
  function renderActiveChat() {
    const chatContainer = document.getElementById('chat'); chatContainer.innerHTML = '';
    const activeChat = chats.find(c => c.id === activeChatId);
    if (!activeChat || activeChat.history.length === 0) {
      chatContainer.innerHTML = `<div id="empty-state"><div class="empty-icon">✨</div><div class="empty-title">How can I help you today?</div><p class="empty-sub">Select your provider, ensure your API key is set, and start chatting. You can upload images and text files too!</p></div>`;
      return;
    }
    activeChat.history.forEach(msg => { if (msg.role !== 'system') appendMessage(msg.role === 'assistant' ? 'ai' : 'user', msg.content); });
  }
  function updateActiveChatHistory(historyArr, newTitle) {
    const activeChat = chats.find(c => c.id === activeChatId);
    if(activeChat) { 
      activeChat.history = historyArr; 
      if(newTitle && activeChat.title === "New Chat") { activeChat.title = newTitle.substring(0, 30) + '...'; } 
      saveChats(); 
    }
  }

  // Input & Attachments
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  
  function handleFileUpload(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      attachments.push({ name: file.name, type: file.type, data: event.target.result });
      renderAttachments();
    };
    if (file.type.startsWith('image/')) { reader.readAsDataURL(file); } 
    else { reader.readAsText(file); }
    e.target.value = '';
  }
  
  function removeAttachment(index) { attachments.splice(index, 1); renderAttachments(); }
  
  function renderAttachments() {
    const container = document.getElementById('attachments-preview');
    container.innerHTML = '';
    attachments.forEach((att, i) => {
      const div = document.createElement('div'); div.className = 'attachment-item';
      const icon = att.type.startsWith('image/') ? `<img src="${att.data}" />` : `📄`;
      div.innerHTML = `${icon} <span>${att.name}</span> <div class="attachment-remove" onclick="removeAttachment(${i})">✖</div>`;
      container.appendChild(div);
    });
  }

  function addCopyButtons(containerElement) {
    containerElement.querySelectorAll('pre').forEach(pre => {
      if(pre.querySelector('.copy-btn')) return;
      const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.textContent = 'Copy';
      btn.onclick = () => { const codeElement = pre.querySelector('code'); if(codeElement) { navigator.clipboard.writeText(codeElement.innerText).then(() => { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); }); } };
      pre.appendChild(btn);
    });
  }

  function formatContentForDisplay(content) {
    if (typeof content === 'string') return marked.parse(content);
    if (Array.isArray(content)) {
      let html = '';
      content.forEach(item => {
        if (item.type === 'text') html += marked.parse(item.text);
        if (item.type === 'image_url') html += `<img src="${item.image_url.url}" />`;
      });
      return html;
    }
    return '';
  }

  function appendMessage(role, content) {
    const empty = document.getElementById('empty-state'); if (empty) empty.remove();
    const chat = document.getElementById('chat'); const div = document.createElement('div'); div.className = `message ${role}`;
    const avatar = document.createElement('div'); avatar.className = 'avatar'; avatar.textContent = role === 'user' ? 'U' : 'AI';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    
    if (role === 'ai') { 
      bubble.innerHTML = formatContentForDisplay(content); 
      addCopyButtons(bubble); 
    } else { 
      bubble.innerHTML = formatContentForDisplay(content); 
    }
    
    div.appendChild(avatar); div.appendChild(bubble); chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const empty = document.getElementById('empty-state'); if (empty) empty.remove();
    const chat = document.getElementById('chat'); const div = document.createElement('div'); div.className = 'message ai'; div.id = 'typing-msg';
    div.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping() { const t = document.getElementById('typing-msg'); if (t) t.remove(); }
  function showError(msg) { 
    const chat = document.getElementById('chat'); 
    const el = document.createElement('div'); 
    el.style.cssText = "background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); padding: 1rem; border-radius: 8px; font-size: 0.85rem; align-self: center; max-width: 600px; text-align: center; margin: 0 auto;";
    el.textContent = '⚠ ' + msg; chat.appendChild(el); chat.scrollTop = chat.scrollHeight; 
  }

  async function sendMessage() {
    const input = document.getElementById('userInput'); 
    let text = input.value.trim(); 
    const apiKey = getActiveApiKey();
    
    const provider = document.getElementById('providerSelect').value;
    let baseUrl = provider === 'custom' ? document.getElementById('customBaseUrl').value.trim() : PROVIDERS[provider].url;
    let modelId = provider === 'custom' ? document.getElementById('customModel').value.trim() : document.getElementById('modelSelect').value;
    
    if (!text && attachments.length === 0) return;
    if (!apiKey) { showError('Please select or add an API Key first.'); document.getElementById('keyModal').showModal(); return; }
    if (!baseUrl || !modelId) { showError('Please specify a Base URL and Model ID.'); return; }
    if (isLoading) return;
    
    // Process Attachments
    let hasImages = false;
    let contentArray = [];
    
    attachments.forEach(att => {
      if(att.type.startsWith('image/')) {
        hasImages = true;
        contentArray.push({ type: "image_url", image_url: { url: att.data } });
      } else {
        text += `\n\n[File: ${att.name}]\n\`\`\`\n${att.data}\n\`\`\`\n`;
      }
    });
    
    let finalContent = text;
    if (hasImages) {
      contentArray.unshift({ type: "text", text: text || "What is in this image?" });
      finalContent = contentArray;
    }

    input.value = ''; input.style.height = 'auto'; 
    attachments = []; renderAttachments();
    
    isLoading = true; document.getElementById('sendBtn').disabled = true;
    appendMessage('user', finalContent);
    
    const activeChat = chats.find(c => c.id === activeChatId);
    let hist = [...activeChat.history];
    if(hist.length === 0) hist.push({ role: 'system', content: "You are a helpful AI assistant." });
    hist.push({ role: 'user', content: finalContent });
    
    updateActiveChatHistory(hist, typeof finalContent === 'string' ? finalContent : "Image Upload"); 
    showTyping();
    
    try {
      const endpoint = baseUrl.endsWith('/') ? `${baseUrl}chat/completions` : `${baseUrl}/chat/completions`;
      
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${apiKey}`,
          // Required for Anthropic if using a proxy that expects it, but standard OpenAI compat ignores it.
          'x-api-key': apiKey 
        },
        body: JSON.stringify({ model: modelId, messages: hist, max_tokens: 4096, temperature: 0.7 })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `API Error ${res.status}`);
      
      const reply = data.choices[0].message.content;
      removeTyping(); appendMessage('ai', reply);
      hist.push({ role: 'assistant', content: reply }); updateActiveChatHistory(hist);
    } catch (err) {
      removeTyping(); showError(err.message); hist.pop(); updateActiveChatHistory(hist);
    }
    isLoading = false; document.getElementById('sendBtn').disabled = false; input.focus();
  }
</script>
